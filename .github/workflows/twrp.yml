name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3

      - name: Dosyaları Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir (Repo Sync)
        run: |
          mkdir workspace
          cd workspace
          
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # GitHub'ın "bulunamadı" dememesi için URL'yi sağlama alıyoruz
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          
          # YENİ VE ÇALIŞAN LİNK: minimal-twrp yerine tiann veya sebaubuntu manifestleri daha stabil
          # Dandelion (Redmi 9A/9C) için genellikle twrp-10.0 veya 11.0 dalları kullanılır.
          repo init --depth=1 -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --no-clone-bundle
          
          # Senkronizasyon (Eğer yine hata verirse -j1 yapıp tek tek çekeceğiz)
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd workspace
          # Cihaz ağacını doğru yere kopyala
          mkdir -p device/xiaomi/dandelion
          cp -r ../device/xiaomi/dandelion/* device/xiaomi/dandelion/
          
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Kaydet (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Image
          path: workspace/out/target/product/dandelion/recovery.img
