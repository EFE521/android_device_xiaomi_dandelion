name: TWRP Build - Official Checkout Method

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Her parçayı tek tek resmi 'checkout' aksiyonu ile çekiyoruz
      - name: Build Sistemini Çek
        uses: actions/checkout@v4
        with:
          repository: minimal-twrp-omni/android_build
          ref: twrp-11
          path: twrp_workspace/build/make

      - name: Recovery Motorunu Çek
        uses: actions/checkout@v4
        with:
          repository: minimal-twrp-omni/android_bootable_recovery
          ref: twrp-11
          path: twrp_workspace/bootable/recovery

      - name: Cihaz Ağacını Çek (Dandelion)
        uses: actions/checkout@v4
        with:
          repository: EFE521/android_device_xiaomi_dandelion
          ref: main
          path: twrp_workspace/device/xiaomi/dandelion

      - name: Derlemeyi Hazırla ve Başlat
        run: |
          cd twrp_workspace
          
          # Eksik dizinleri oluştur
          mkdir -p out
          
          # Omni yapısı için sembolik link (Önemli!)
          ln -s build/make/core build/core || true
          
          # Ortamı yükle
          . build/make/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Cihazı seç ve derle
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: twrp_workspace/out/target/product/dandelion/recovery.img
