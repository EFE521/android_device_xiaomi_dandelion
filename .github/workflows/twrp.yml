name: TWRP Recovery Build - SSH Force Strike

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: SSH ve Git Kimliğini Zorla Kur
        run: |
          # Git ayarlarını temizle
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # HTTPS yerine SSH kullanması için zorla (github.com için)
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          
          # SSH anahtar kontrolünü devre dışı bırak (Soru sormasın diye)
          mkdir -p ~/.ssh
          echo "Host github.com" >> ~/.ssh/config
          echo "    StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Kaynakları Manuel Topla
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace

          # 1. Parçaları çek (HTTPS yerine otomatik SSH kullanacak)
          # Manifest
          git clone --depth=1 git@github.com:minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 .repo/manifests
          
          # Build sistemi
          mkdir -p build
          git clone --depth=1 git@github.com:minimal-twrp-omni/android_build.git -b twrp-11 build/make
          
          # Recovery
          git clone --depth=1 git@github.com:minimal-twrp-omni/android_bootable_recovery.git -b twrp-11 bootable/recovery
          
          # 2. Senin Cihaz Ağacın
          git clone --depth=1 git@github.com:EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          [ -d build/make ] && ln -s build/make/core build/core || true
          
          . build/make/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Sonucu Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
