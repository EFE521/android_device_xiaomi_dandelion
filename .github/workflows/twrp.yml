name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Cihaz Ağacını Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir (No-Auth Strategy)
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # Git'in interaktif olmasını engelle
          export GIT_TERMINAL_PROMPT=0
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # GitHub'ın eklediği tüm engelleyici ayarları temizle
          git config --global --unset-all http.https://github.com/.extraheader || true
          
          # MANUEL KURULUM: Repo'nun hata yapma lüksünü elinden alıyoruz
          mkdir -p .repo/manifests
          
          # Git Clone yerine doğrudan ZIP/Tarball çekerek 'Username' hatasından kaçıyoruz
          curl -L https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni/archive/refs/heads/twrp-11.tar.gz | tar xz -C .repo/manifests --strip-components=1
          
          # Repo'ya her şeyin hazır olduğunu söyleyen dosyayı oluştur
          cp .repo/manifests/default.xml .repo/manifest.xml
          
          # Repo init (Sadece yerel yapılandırma için)
          repo init -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --depth=1
          
          # Senkronizasyon (GitHub'ın genel sunucularından çekeceği için auth istememeli)
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          mkdir -p device/xiaomi/dandelion
          cp -r $GITHUB_WORKSPACE/device/xiaomi/dandelion/* device/xiaomi/dandelion/
          
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Image
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
