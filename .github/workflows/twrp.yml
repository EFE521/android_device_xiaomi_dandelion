name: TWRP Build - Official Omni Base

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Resmi OmniROM Build sistemini çekiyoruz
      - name: Build Sistemini Çek (Official Omni)
        uses: actions/checkout@v4
        with:
          repository: android_build
          ref: android-11
          path: twrp_workspace/build/make

      # 2. Resmi TWRP Recovery motorunu çekiyoruz
      - name: Recovery Motorunu Çek (Official TWRP)
        uses: actions/checkout@v4
        with:
          repository: TeamWin/android_bootable_recovery
          ref: android-11
          path: twrp_workspace/bootable/recovery

      # 3. Senin Cihaz Ağacın
      - name: Cihaz Ağacını Çek (Dandelion)
        uses: actions/checkout@v4
        with:
          repository: EFE521/android_device_xiaomi_dandelion
          ref: main
          path: twrp_workspace/device/xiaomi/dandelion

      - name: Derlemeyi Hazırla ve Başlat
        run: |
          cd twrp_workspace
          
          # Dizin yapısını resmi Omni standartlarına göre kuruyoruz
          mkdir -p out
          # Klasör isimlerini build sisteminin beklediği şekle sokalım
          [ -d build/make ] && ln -s build/make/core build/core || true
          
          # Ortam kurulumu
          . build/make/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Dandelion için derleme
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: twrp_workspace/out/target/product/dandelion/recovery.img
