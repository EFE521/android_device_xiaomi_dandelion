- name: Repo ve Bağımlılıkları Hazırla
      run: |
        # Çalışma dizinini oluştur
        mkdir -p workspace
        cd workspace
        
        # Temel Android yapılandırma araçlarını indir (Daha önce başardığımız kısım)
        git config --global user.email "mizanege@example.com"
        git config --global user.name "mizanege"
        
        # Cihaz ağacını (dandelion) TOKEN ile klonla (Hata veren yer burasıydı, düzelttik)
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mizanege/android_device_xiaomi_dandelion.git device/xiaomi/dandelion

    - name: Eksik Dosyaları ve Clang'i Çek
      run: |
        cd workspace
        # Önceki denemede başarıyla geçen o 38 bin dosyayı çeken komut
        git clone --depth=1 https://github.com/minimal-manifest-twrp/platform_prebuilts_clang_host_linux-x86.git prebuilts/clang/host/linux-x86
        
        # Diğer kritik bağımlılıklar
        git clone --depth=1 https://github.com/minimal-manifest-twrp/platform_external_golang-protobuf.git external/golang-protobuf
        git clone --depth=1 https://github.com/minimal-manifest-twrp/platform_external_pcre.git external/pcre
        git clone --depth=1 https://github.com/minimal-manifest-twrp/platform_external_selinux.git external/selinux

    - name: Derlemeyi Başlat
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        . build/envsetup.sh
        lunch twrp_dandelion-eng
        mka recoveryimage
