name: TWRP Build - No Repo Tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Kaynak Kodlarını İndir (Direct Clone)
        run: |
          # Ana build araçlarını repo kullanmadan çekiyoruz
          git clone --depth=1 https://github.com/Minimal-TWRP/platform_manifest_twrp_aosp.git -b twrp-11 workspace
          cd workspace
          
          # Derleme için hayati olan 'build' ve 'prebuilts' klasörlerini çekiyoruz
          # Bu kısımlar repo olmadan hata verebileceği için en garantisini yapıyoruz:
          git clone --depth=1 https://android.googlesource.com/platform/build -b android-11.0.0_r1 build/make
          git clone --depth=1 https://android.googlesource.com/platform/system/core -b android-11.0.0_r1 system/core

      - name: Cihaz Ağacını Ekle
        run: |
          cd workspace
          mkdir -p device/xiaomi/dandelion
          git clone --depth=1 https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: TWRP Derle
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Klasör yapısını kontrol et (Debug için)
          ls -R device/xiaomi/dandelion
          
          [ -f build/envsetup.sh ] && source build/envsetup.sh || echo "envsetup bulunamadı!"
          
          # Lunch ve Build
          lunch omni_dandelion-eng || lunch twrp_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Result
          path: workspace/out/target/product/dandelion/*.img
