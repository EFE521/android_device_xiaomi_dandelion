name: Redmi 10A TWRP Build (Dandelion)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Ortamını Hazırla
        run: |
          sudo apt update
          sudo apt install -y build-essential bc zip libstdc++6 git wget python3 rsync curl
          git config --global user.email "efe@example.com"
          git config --global user.name "efe"

      - name: Kaynak Kodlarını ve Eksik Bağımlılıkları Çek
        run: |
          # Dizin yapısını kuruyoruz
          mkdir workspace
          cd workspace
          
          # Temel build parçaları (Android 11)
          git clone https://android.googlesource.com/platform/build build -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/build/soong build/soong -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/build/blueprint build/blueprint -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/system/core system/core -b android-11.0.0_r1
          
          # LOGDAKİ HATAYI ÇÖZEN KRİTİK DOSYALAR
          mkdir -p external
          git clone https://android.googlesource.com/platform/external/golang-protobuf external/golang-protobuf -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/external/pcre external/pcre -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/external/selinux external/selinux -b android-11.0.0_r1
          
          # Prebuilts
          mkdir -p prebuilts/build-tools
          mkdir -p prebuilts/go/linux-x86
          mkdir -p prebuilts/clang/host/linux-x86
          git clone https://android.googlesource.com/platform/prebuilts/build-tools prebuilts/build-tools -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/prebuilts/go/linux-x86 prebuilts/go/linux-x86 -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86 -b android-11.0.0_r1
          
          # Senin asıl cihaz ağacın (Dandelion)
          mkdir -p device/xiaomi/dandelion
          git clone https://github.com/mizanege/android_device_xiaomi_dandelion device/xiaomi/dandelion

      - name: TWRP Derlemeyi Başlat
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_dandelion-eng || lunch dandelion-eng
          mka recoveryimage -j$(nproc)
