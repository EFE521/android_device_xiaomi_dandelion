name: TWRP Recovery Build - Ultra Force

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi ve Araçları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          # Bu sefer repo kurmuyoruz, sadece Git kullanacağız

      - name: Kaynak Kodlarını Manuel Topla (Repo Bypass)
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # Git ayarlarını sıfırla
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # 1. Manifest'i manuel indirip içini okuyacağız (Aslında temel kodları çekiyoruz)
          # TWRP-11 için minimal kod yapısını doğrudan klonla
          git clone https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 .repo/manifests
          
          # 2. Ana yapıyı (build, core vb.) çekiyoruz
          # Bütün repo'yu senkronize etmek yerine sadece lazım olanları alalım
          git clone https://github.com/minimal-twrp-omni/android_build.git -b twrp-11 build/make
          git clone https://github.com/minimal-twrp-omni/android_bootable_recovery.git -b twrp-11 bootable/recovery
          
          # 3. Cihaz ağacını senin repodan çek
          git clone https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: Derleme Ortamını Hazırla ve Başlat
        run: |
          cd ~/twrp_workspace
          
          # Build klasörüne link ver (Omni bazen build/make arar)
          ln -s build/make/core build/core || true
          
          # Ortamı yükle
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Derle
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Sonucu Yükle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
