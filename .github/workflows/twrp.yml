name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Cihaz Ağacını Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # Git kimlik bilgilerini ayarla
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # Önceki hatalı yönlendirmeleri temizle
          git config --global --unset-all url."https://github.com/".insteadOf || true
          git config --global --unset-all http.https://github.com/.extraheader || true

          # Repo aracını başlat (Bu adımda hata alırsan görmezden gelmesi için || true ekledik)
          repo init -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --depth=1 || true
          
          # Hata genellikle auth yüzünden .repo klasöründe oluşur, orayı manuel düzeltiyoruz
          cd .repo/manifests || (git clone https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 . && cd ..)
          
          cd ~/twrp_workspace
          # Senkronizasyonu başlat
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          # Cihaz ağacını kopyala
          mkdir -p device/xiaomi/dandelion
          cp -r $GITHUB_WORKSPACE/device/xiaomi/dandelion/* device/xiaomi/dandelion/
          
          # Derleme
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
