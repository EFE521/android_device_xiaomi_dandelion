name: TWRP Build - Adding Missing Soong

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Build Sistemini Çek (AOSP)
      - name: Build Sistemini Çek (AOSP)
        uses: actions/checkout@v4
        with:
          repository: aosp-mirror/platform_build
          ref: android-11.0.0_r1
          path: twrp_workspace/build/make

      # 2. EKSİK PARÇA: Soong Build Sistemini Çek
      - name: Soong Sistemini Çek (AOSP)
        uses: actions/checkout@v4
        with:
          repository: aosp-mirror/platform_build_soong
          ref: android-11.0.0_r1
          path: twrp_workspace/build/soong

      # 3. Recovery Motorunu Çek
      - name: Recovery Motorunu Çek (Official TWRP)
        uses: actions/checkout@v4
        with:
          repository: TeamWin/android_bootable_recovery
          ref: android-11
          path: twrp_workspace/bootable/recovery

      # 4. Senin Cihaz Ağacın
      - name: Cihaz Ağacını Çek (Dandelion)
        uses: actions/checkout@v4
        with:
          repository: EFE521/android_device_xiaomi_dandelion
          ref: main
          path: twrp_workspace/device/xiaomi/dandelion

      - name: Derlemeyi Hazırla ve Başlat
        run: |
          cd twrp_workspace
          
          # Dizin yapılandırmasını düzeltiyoruz
          mkdir -p out
          # Klasörleri build sisteminin beklediği ana dizine linkliyoruz
          ln -s build/make/core build/core || true
          
          # Ortamı yükle (Hatanın çözüldüğü yer burası)
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/make/envsetup.sh
          
          # Dandelion için derlemeyi başlat
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: twrp_workspace/out/target/product/dandelion/recovery.img
