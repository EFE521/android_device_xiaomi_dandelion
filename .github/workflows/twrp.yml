name: Redmi 10A TWRP Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Ortamını Hazırla
        run: |
          sudo apt update
          sudo apt install -y build-essential bc zip libstdc++6 git wget python3 rsync curl
          git config --global user.email "efe@example.com"
          git config --global user.name "efe"

      - name: Kaynak Kodlarını ve Eksik Bağımlılıkları Çek
        run: |
          mkdir workspace
          cd workspace
          # Temel build sistemini çekiyoruz
          git clone https://android.googlesource.com/platform/build workspace/build -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/build/soong workspace/build/soong -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/build/blueprint workspace/build/blueprint -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/system/core workspace/system/core -b android-11.0.0_r1
          
          # SENİN HATANI ÇÖZEN KRİTİK KISIM BURASI
          mkdir -p external
          git clone https://android.googlesource.com/platform/external/golang-protobuf external/golang-protobuf -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/external/pcre external/pcre -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/external/selinux external/selinux -b android-11.0.0_r1
          
          # Prebuilts (Build için gereken araçlar)
          git clone https://android.googlesource.com/platform/prebuilts/build-tools workspace/prebuilts/build-tools -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/prebuilts/go/linux-x86 workspace/prebuilts/go/linux-x86 -b android-11.0.0_r1
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 workspace/prebuilts/clang/host/linux-x86 -b android-11.0.0_r1
          
          # Senin cihaz ağacın (Dandelion)
          mkdir -p device/xiaomi/dandelion
          git clone https://github.com/YUKLEDIGIN_REPO_LINKI device/xiaomi/dandelion

      - name: TWRP Derlemeyi Başlat
        run: |
          cd workspace
          source build/envsetup.sh
          # Loglarda hata veren lunch aşamasını tetikliyoruz
          lunch twrp_dandelion-eng || lunch dandelion-eng
          mka recoveryimage -j$(nproc)
