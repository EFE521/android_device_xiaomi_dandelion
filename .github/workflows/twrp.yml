name: TWRP Build - Proper Paths Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Google'ın (AOSP) ana build sistemini çekiyoruz
      - name: Build Sistemini Çek (AOSP)
        uses: actions/checkout@v4
        with:
          repository: aosp-mirror/platform_build
          ref: android-11.0.0_r1
          path: twrp_workspace/build/make

      # 2. Resmi TWRP Recovery motorunu çekiyoruz
      - name: Recovery Motorunu Çek (Official TWRP)
        uses: actions/checkout@v4
        with:
          repository: TeamWin/android_bootable_recovery
          ref: android-11
          path: twrp_workspace/bootable/recovery

      # 3. Senin Cihaz Ağacın
      - name: Cihaz Ağacını Çek (Dandelion)
        uses: actions/checkout@v4
        with:
          repository: EFE521/android_device_xiaomi_dandelion
          ref: main
          path: twrp_workspace/device/xiaomi/dandelion

      - name: Derlemeyi Hazırla ve Başlat
        run: |
          cd twrp_workspace
          
          # Dizin yapılandırması
          mkdir -p out
          # Omni derleme yapısı için çekirdek linki
          ln -s build/make/core build/core || true
          
          # Ortamı yükle
          . build/make/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Dandelion için saldır!
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Final
          path: twrp_workspace/out/target/product/dandelion/recovery.img
