name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # GitHub'a okuma izni veriyoruz
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3

      - name: Dosyaları Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir (Repo Sync)
        run: |
          mkdir workspace
          cd workspace
          
          # Git kimliğini ayarla
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # KRİTİK: GitHub Token'ı kullanarak kimlik doğrulamasını otomatikleştir
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          
          # Repo aracını indir
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          
          # Şifre sormasını engellemek için --no-clone-bundle ekledik
          repo init --depth=1 -u https://github.com/minimal-twrp/platform_manifest_twrp_omni.git -b twrp-11 --no-clone-bundle
          
          # Sync başlat
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd workspace
          cp -r ../device/xiaomi/dandelion device/xiaomi/dandelion
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Kaydet (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion
          path: workspace/out/target/product/dandelion/recovery.img
