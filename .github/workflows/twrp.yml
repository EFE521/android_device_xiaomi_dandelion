name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Cihaz Ağacını Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir (Force Manual)
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # Git kimlik bilgilerini ayarla
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # GitHub'ın bazen otomatik eklediği ve çakışma yaratan header'ı sil
          git config --global --unset-all http.https://github.com/.extraheader || true

          # 1. MANUEL ADIM: .repo klasörünü ve manifesti biz oluşturuyoruz
          mkdir -p .repo/manifests
          
          # Manifesti doğrudan klasörün içine klonla (Bu adım repo'nun hata yaptığı yerdir)
          git clone --depth=1 https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 .repo/manifests/
          
          # default.xml dosyasının yerinde olduğunu kontrol et ve kopyala
          cp .repo/manifests/default.xml .repo/manifest.xml

          # 2. ADIM: Repo'yu yerel manifest ile başlat (İnternete sormadan)
          repo init -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --depth=1 --no-clone-bundle
          
          # 3. ADIM: Senkronizasyon
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          # Cihaz ağacını çalışma dizinine taşı
          mkdir -p device/xiaomi/dandelion
          cp -r $GITHUB_WORKSPACE/device/xiaomi/dandelion/* device/xiaomi/dandelion/
          
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Image
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
