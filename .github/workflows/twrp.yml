name: TWRP Build - Final Manifest Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          # Güncel Repo aracını indir ve yetki ver
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

      - name: Manifesti Senkronize Et
        run: |
          export PATH=~/bin:$PATH
          mkdir twrp_workspace && cd twrp_workspace
          git config --global user.email "efe@example.com"
          git config --global user.name "EFE521"
          
          # Branch ismini garantiye almak için 'twrp-11' yerine 'twrp-11.0' deniyoruz
          # Minimal-manifest genelde bu formatı kullanır
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-11.0
          
          # Eğer yukarıdaki hata verirse alternatif: -b twrp-11
          
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Cihaz Ağacını Ekle
        run: |
          cd twrp_workspace
          # Dandelion ağacını doğru konuma çekiyoruz
          git clone --depth=1 https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: TWRP Derle
        run: |
          cd twrp_workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          # Artık build/envsetup.sh repo sync ile geldi
          source build/envsetup.sh
          
          # Cihaz ağacındaki lunch ismine göre (omni_dandelion genelde standarttır)
          lunch omni_dandelion-eng || lunch twrp_dandelion-eng
          
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Final
          path: twrp_workspace/out/target/product/dandelion/recovery.img
