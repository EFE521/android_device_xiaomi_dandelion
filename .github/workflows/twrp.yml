name: TWRP Build - Dandelion Final Fixed V5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla (Ubuntu 24.04 Fix)
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          
      - name: Kaynak Kodlarını Kur (Yapısal Düzenleme)
        run: |
          git config --global user.email "efe@example.com"
          git config --global user.name "EFE521"
          
          mkdir workspace && cd workspace
          
          # 1. Ana Manifest ve Build sistemini çek
          git clone --depth=1 https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 .
          
          # 2. Build klasörünü OLMASI GEREKTİĞİ GİBİ kur
          # Önce geçici klasöre çekip sonra içeriği build/ içine dağıtacağız
          git clone --depth=1 https://android.googlesource.com/platform/build -b android-11.0.0_r1 temp_build
          mkdir -p build
          cp -r temp_build/* build/
          rm -rf temp_build
          
          # 3. Alt build bileşenlerini yerleştir
          git clone --depth=1 https://android.googlesource.com/platform/build/soong -b android-11.0.0_r1 build/soong
          git clone --depth=1 https://android.googlesource.com/platform/build/blueprint -b android-11.0.0_r1 build/blueprint
          
          # 4. Diğer hayati organlar
          git clone --depth=1 https://android.googlesource.com/platform/external/golang-protobuf -b android-11.0.0_r1 external/golang-protobuf
          git clone --depth=1 https://android.googlesource.com/platform/system/core -b android-11.0.0_r1 system/core
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/build-tools -b android-11.0.0_r1 prebuilts/build-tools
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/go/linux-x86 -b android-11.0.0_r1 prebuilts/go/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android-11.0.0_r1 prebuilts/clang/host/linux-x86

      - name: Cihaz Ağacını Ekle
        run: |
          cd workspace
          mkdir -p device/xiaomi/dandelion
          git clone --depth=1 https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: TWRP Derle (Zorlu Mod)
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # envsetup.sh'ın varlığını teyit et ve çalıştır
          if [ -f build/envsetup.sh ]; then
            source build/envsetup.sh
          elif [ -f build/make/envsetup.sh ]; then
            source build/make/envsetup.sh
          else
            echo "Kritik Hata: envsetup.sh bulunamadı!" && exit 1
          fi
          
          # Cihazı seçerken mimari hatasını engellemek için direkt hedefi gösterelim
          lunch twrp_dandelion-eng || lunch omni_dandelion-eng
          
          # Temizlik ve derleme
          make recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Final
          path: |
            workspace/out/target/product/dandelion/*.img
            workspace/out/*.log
