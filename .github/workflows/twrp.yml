name: TWRP Recovery Build - Manuel Sync

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi ve Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          # Repo aracını kur
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/local/bin/repo
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Kaynak Kodunu ve Cihaz Ağacını Hazırla
        run: |
          # Git kimlik bilgilerini set et (Repo için şart)
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          # Workspace oluştur
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # 1. ADIM: Manifest'i Init et (Kimlik sorma ihtimaline karşı terminal promptunu kapatıyoruz)
          export GIT_TERMINAL_PROMPT=0
          repo init -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --depth=1 --no-clone-bundle
          
          # 2. ADIM: Kaynakları çek
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
          
          # 3. ADIM: Cihaz ağacını MANUEL çek (Actions/checkout kullanmadığımız için)
          git clone https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          
          # Ortamı hazırla
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Cihaza özel derleme başlat
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
