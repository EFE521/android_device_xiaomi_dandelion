name: TWRP Build - Fixing Artifact Path

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3 golang-go
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Build Sistemini Çek
      - name: Build Sistemini Çek (AOSP)
        run: |
          git clone --depth=1 -b android-11.0.0_r1 https://android.googlesource.com/platform/build twrp_workspace/build/make
          git clone --depth=1 -b android-11.0.0_r1 https://android.googlesource.com/platform/build/soong twrp_workspace/build/soong
          git clone --depth=1 -b android-11.0.0_r1 https://android.googlesource.com/platform/build/blueprint twrp_workspace/build/blueprint

      # 2. Go Ortamını Hazırla
      - name: Go Ortamını Hazırla
        run: |
          mkdir -p twrp_workspace/prebuilts/go/linux-x86/bin
          cp $(which go) twrp_workspace/prebuilts/go/linux-x86/bin/go

      # 3. Recovery Motorunu Çek
      - name: Recovery Motorunu Çek
        uses: actions/checkout@v4
        with:
          repository: TeamWin/android_bootable_recovery
          ref: android-11
          path: twrp_workspace/bootable/recovery

      # 4. Senin Cihaz Ağacın
      - name: Cihaz Ağacını Çek (Dandelion)
        uses: actions/checkout@v4
        with:
          repository: EFE521/android_device_xiaomi_dandelion
          ref: main
          path: twrp_workspace/device/xiaomi/dandelion

      - name: Derlemeyi Hazırla ve Başlat
        run: |
          cd twrp_workspace
          mkdir -p out
          ln -s build/make/core build/core || true
          
          export PATH=$PATH:$(pwd)/prebuilts/go/linux-x86/bin
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/make/envsetup.sh
          
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      # BURASI DÜZELDİ: actions/ eklendi
      - name: Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: twrp_workspace/out/target/product/dandelion/recovery.img
