name: TWRP Build - Never Give Up

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Manifesti Senkronize Et
        run: |
          export PATH=~/bin:$PATH
          mkdir twrp_workspace && cd twrp_workspace
          git config --global user.email "efe@example.com"
          git config --global user.name "EFE521"
          
          # BU SEFER RESMİ TWRP MANİFESTİ VE GARANTİ BRANCH (twrp-11)
          repo init --depth=1 -u https://github.com/Minimal-TWRP/platform_manifest_twrp_aosp.git -b twrp-11
          
          # Sadece build ve temel araçları çekerek disk alanını koruyoruz
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Cihaz Ağacını Ekle
        run: |
          cd twrp_workspace
          # Dandelion ağacını konumluyoruz
          git clone --depth=1 https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      - name: TWRP Derle
        run: |
          cd twrp_workspace
          export PATH=~/bin:$PATH
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Ortamı yükle
          source build/envsetup.sh
          
          # Dandelion için doğru komutu bulmaya çalışalım
          lunch omni_dandelion-eng || lunch twrp_dandelion-eng || lunch aosp_dandelion-eng
          
          # Derleme
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Attempt-44
          path: twrp_workspace/out/target/product/dandelion/*.img
