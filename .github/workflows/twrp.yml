name: TWRP Derleme Botu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Alan Temizliği ve Hazırlık
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get update
        sudo apt-get install -y bc build-essential tar zip curl libstdc++6 git python3

    - name: Repo Aracını Kur
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Kaynak Kodları Çek (Minimal-TWRP)
      run: |
        mkdir workspace && cd workspace
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Cihaz Ağacını Klonla
      run: |
        cd workspace
        git clone https://github.com/EFE521/android_device_xiaomi_dandelion.git device/xiaomi/dandelion

    - name: Derlemeyi Başlat (Mka)
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_dandelion-eng
        mka recoveryimage -j$(nproc --all)

    - name: Sonucu Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Dandelion-Build
        path: workspace/out/target/product/dandelion/recovery.img
