name: TWRP Build - Minimal Manifest Approach

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3 repo
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      # 1. Minimal TWRP Manifesti ile Ortamı Kur (Hataları önleyen asıl kısım)
      - name: Manifesti Senkronize Et
        run: |
          mkdir twrp_workspace && cd twrp_workspace
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          # Minimal manifest her şeyi (build, soong, prebuilts) doğru hiyerarşide çeker
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-11
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # 2. Senin Cihaz Ağacını Yerine Koy
      - name: Cihaz Ağacını Ekle
        run: |
          cd twrp_workspace
          git clone https://github.com/EFE521/android_device_xiaomi_dandelion.git -b main device/xiaomi/dandelion

      # 3. Derlemeyi Başlat
      - name: TWRP Derle
        run: |
          cd twrp_workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          # Artık envsetup ana build dizininde hazır
          source build/envsetup.sh
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: twrp_workspace/out/target/product/dandelion/recovery.img
