name: TWRP Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sistemi Hazırla
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          sudo mv repo /usr/local/bin/
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Cihaz Ağacını Çek
        uses: actions/checkout@v4
        with:
          path: device/xiaomi/dandelion

      - name: Kaynak Kodunu İndir (Sade ve Sorunsuz Yöntem)
        run: |
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace
          
          # Önceki hatalı configleri temizle (Workflow içinde temiz bir sayfa açalım)
          git config --global --unset-all url."https://github.com/".insteadOf || true
          git config --global --unset-all url."https://x-access-token".insteadOf || true
          
          # Git'e asla soru sorma, hata varsa patla dedik
          export GIT_TERMINAL_PROMPT=0
          
          # Repo init - Token falan karıştırmıyoruz, dümdüz public link
          repo init -u https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni.git -b twrp-11 --depth=1
          
          # Senkronizasyon (Hızlı ve temiz çekim)
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          # Checkout ile inen cihaz ağacını workspace içine taşı
          mkdir -p device/xiaomi/dandelion
          cp -r $GITHUB_WORKSPACE/device/xiaomi/dandelion/* device/xiaomi/dandelion/
          
          . build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Image
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
