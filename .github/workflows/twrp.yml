name: TWRP Recovery Build - Ultimate Force

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Kaynakları Zorla Çek
        run: |
          # Git'i tamamen sıfırla, hiçbir kalıntı kalmasın
          rm -rf ~/.gitconfig
          git config --global user.name "EFE521"
          git config --global user.email "efe@gmail.com"
          
          mkdir -p ~/twrp_workspace
          cd ~/twrp_workspace

          # 1. Parçaları URL içinde TOKEN ile çekiyoruz (Public olsa bile yetkiyi basıyoruz)
          # NOT: URL sonundaki .git takısını ve slash işaretlerini garantiye alıyoruz
          
          # Manifest
          git clone --depth=1 "https://github.com/minimal-twrp-omni/platform_manifest_twrp_omni" -b twrp-11 .repo/manifests
          
          # Build sistemi
          mkdir -p build
          git clone --depth=1 "https://github.com/minimal-twrp-omni/android_build" -b twrp-11 build/make
          
          # Recovery motoru
          git clone --depth=1 "https://github.com/minimal-twrp-omni/android_bootable_recovery" -b twrp-11 bootable/recovery
          
          # 2. SENİN CİHAZ AĞACIN (Burada kendi token'ını kullanıyoruz ki senin repona tam yetki alsın)
          git clone --depth=1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/EFE521/android_device_xiaomi_dandelion.git" -b main device/xiaomi/dandelion

      - name: Derlemeyi Başlat
        run: |
          cd ~/twrp_workspace
          # Omni derleme sisteminde build/make/core'a erişim için linkleme gerekebilir
          [ -d build/make ] && ln -s build/make/core build/core || true
          
          . build/make/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          lunch omni_dandelion-eng
          mka recoveryimage -j$(nproc --all)

      - name: Dosyayı Artifact Olarak Kaydet
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Dandelion-Recovery
          path: ~/twrp_workspace/out/target/product/dandelion/recovery.img
